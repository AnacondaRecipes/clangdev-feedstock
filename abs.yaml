# 4 hours timeout for Windows build (default is 2 hours)
task_timeout: 14400

build_parameters:
  - "--suppress-variables"
  - "--error-overlinking"

# Stage 0: Upload to new staging channel
staging_channel_upload_target: llvm22-stage0

# All LLVM 22 Stage 0 packages on anaconda.org (PBP staging corrupts large files, SIR-2834)
channels:
  - https://conda.anaconda.org/xkong-staging

aggregate_check: false
