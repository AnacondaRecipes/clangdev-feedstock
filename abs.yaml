# 4 hours timeout for Windows build (default is 2 hours)
task_timeout: 14400

build_parameters:
  - "--suppress-variables"
  - "--error-overlinking"

# Stage 0: Upload to LLVM 22 staging channel
staging_channel_upload_target: llvm-22.1.2-stage0-build-0

# Need llvmdev 22.1.2 from Stage 0 (built by llvmdev-feedstock)
channels:
  - https://staging.continuum.io/pbp/llvm-22.1.2-stage0-build-0

aggregate_check: false
