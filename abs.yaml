# 4 hours timeout for Windows build (default is 2 hours)
task_timeout: 14400

build_parameters:
  - "--suppress-variables"
  - "--error-overlinking"

# Stage 0: Upload to new staging channel
staging_channel_upload_target: llvm22-stage0

# Need llvmdev 22.1.2 + libcxx-devel 22.1.2 from Stage 0
# xkong-staging has llvm-tools (480MB) — PBP staging corrupts large files (SIR-2834)
channels:
  - https://staging.continuum.io/pbp/llvm22-stage0
  - https://conda.anaconda.org/xkong-staging

aggregate_check: false
