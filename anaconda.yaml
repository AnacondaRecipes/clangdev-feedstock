anaconda_config_version: 1
upstream_sources:
  - github:
      identifier: llvm/llvm-project
      use_max_tag: true
      include_regex: ^llvmorg-\d+\.\d+\.\d+$
      from_pattern: ^llvmorg-(.+)$
      to_pattern: \1
    packages:
      - clang
      - clang-22
      - clang-format
      - clang-format-22
      - clang-tools
      - clangdev
      - clangxx
      - libclang
      - libclang-cpp
      - libclang-cpp22.1
      - libclang13
      - python-clang
